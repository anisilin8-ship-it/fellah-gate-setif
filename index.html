<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الفلاح - سطيف</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 30px; border-radius: 20px;
            width: 350px; text-align: center; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input {
            width: 100%; padding: 12px; margin: 15px 0;
            border-radius: 10px; border: none; text-align: center; font-size: 1.1rem;
        }
        button {
            width: 100%; padding: 12px; background: #1e6b3e;
            color: white; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; font-size: 1.1rem;
        }
        .footer-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(0,0,0,0.8); color: #fbbf24;
            padding: 10px; text-align: center; font-weight: bold;
        }
        /* تنسيق جدول النتائج */
        .result-panel { background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; display: none; width: 90%; max-width: 700px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #444; padding: 10px; text-align: center; }
        th { color: #fbbf24; }
    </style>
</head>
<body>

    <div id="login-section" class="login-card">
        <h2 style="color: #fbbf24; margin-bottom: 5px;">🌾 بوابة الفلاح سطيف</h2>
        <p style="font-size: 0.9rem;">التعاونية للحبوب والبقول الجافة بسطيف - CCLS SETIF</p>
        <p>استعلم عن مستحقاتك لموسم الحصاد 2025/2026</p>
        
        <input type="text" id="pCode" placeholder="190819550000945">
        <button onclick="showResults()">دخول للحساب</button>
        <p id="error-msg" style="color: #ff4d4d; display: none; margin-top: 10px;">❌ الفلاح غير موجود</p>
    </div>

    <div id="result-panel" class="result-panel">
        <h2 style="color: #fbbf24;">📋 معلومات الشريك</h2>
        <div id="farmer-info" style="text-align: right; margin-bottom: 15px; color: white;"></div>
        <table>
            <thead>
                <tr>
                    <th>رقم البون</th>
                    <th>التاريخ</th>
                    <th>المنتج</th>
                    <th>الكمية</th>
                </tr>
            </thead>
            <tbody id="table-body" style="color: white;"></tbody>
        </table>
        <button onclick="location.reload()" style="margin-top: 20px; background: #666;">خروج</button>
    </div>

    <div class="footer-bar">🌾 مرحباً بكم في البوابة الرقمية لتعاونية الحبوب لولاية سطيف</div>

    <script>
        async function showResults() {
            const code = document.getElementById('pCode').value;
            const errorMsg = document.getElementById('error-msg');
            if(!code) return;

            try {
                // التصحيح هنا: حذفنا localhost ليعمل في الإنترنت تلقائياً
                const response = await fetch(`/api/search/${code}`);
                const result = await response.json();

                if (result.success) {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('result-panel').style.display = 'block';
                    document.getElementById('farmer-info').innerHTML = `<b>الاسم:</b> ${result.farmerName} <br> <b>الكود:</b> ${code}`;
                    
                    let rows = "";
                    result.data.forEach(item => {
                        rows += `<tr><td>${item.NoBon}</td><td>${item.Date}</td><td>${item.Produit}</td><td>${item.Qte}</td></tr>`;
                    });
                    document.getElementById('table-body').innerHTML = rows;
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                alert("خطأ في الاتصال بالسيرفر");
            }
        }
    </script>
</body>
</html>
