<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الفلاح الرقمية | CCLS Sétif</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #fbbf24; 
            --green: #10b981; 
            --dark-bg: rgba(0, 0, 0, 0.7); /* خلفية سوداء شفافة فخمة */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            /* الحفاظ على صورتك الأصلية للحقل عند الغروب */
            background: #064e3b url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* حاوية التصميم الزجاجي المطور */
        .glass-panel {
            background: var(--dark-bg);
            backdrop-filter: blur(15px); /* تأثير ضبابي قوي */
            border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 50px; width: 95%; max-width: 750px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-icon { font-size: 3.5rem; color: var(--gold); margin-bottom: 10px; }
        .logo-title { font-size: 2.8rem; font-weight: 900; color: white; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .sub-title { font-size: 1.4rem; margin: 5px 0 25px 0; color: var(--gold); }

        /* صندوق الإدخال المطور والأنيق */
        .input-group { position: relative; width: 85%; margin: 0 auto 25px auto; }
        input {
            width: 100%; padding: 16px 16px 16px 60px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: white; font-size: 1.2rem; text-align: center;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        .input-icon {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            color: var(--green); font-size: 1.4rem;
        }

        button {
            background: linear-gradient(135deg, var(--green), #059669);
            color: white; border: none; padding: 15px 45px; border-radius: 12px;
            cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.3s;
            display: inline-flex; align-items: center; gap: 10px;
        }
        button:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }

        .fb-link { color: #60a5fa; text-decoration: none; font-weight: bold; font-size: 1.1rem; margin-top: 25px; display: inline-block; }

        /* تنسيق نتائج البحث الفخم */
        .farmer-info {
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px;
            margin-bottom: 25px; text-align: right; border-right: 5px solid var(--gold);
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }

        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.2); border-radius: 15px; overflow: hidden; }
        th { background: rgba(251, 191, 36, 0.1); color: var(--gold); padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }

        .footer-ticker {
            position: fixed; bottom: 0; width: 100%; background: rgba(6, 78, 59, 0.95);
            color: var(--gold); padding: 10px 0; overflow: hidden; white-space: nowrap; border-top: 1px solid var(--gold);
        }
        .ticker-text { display: inline-block; animation: ticker 35s linear infinite; font-weight: bold; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div id="search-area">
            <i class="fa-solid fa-wheat-awn logo-icon"></i>
            <h1 class="logo-title">CCLS SÉTIF</h1>
            <div class="sub-title">البوابة الرقمية للفلاح</div>
            <p>موسم الحصاد والدرس <span style="color: var(--gold); font-weight: bold;">2025/2026</span></p>

            <div class="input-group">
                <input type="text" id="pCode" placeholder="أدخل كود الشريك الخاص بك">
                <i class="fa-solid fa-id-card input-icon"></i>
            </div>

            <button onclick="doSearch()">
                <i class="fa-solid fa-fingerprint"></i> دخول النظام
            </button>
