<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الفلاح سطيف | البوابة الرقمية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary-green: #2d6a4f;
            --accent-gold: #fbbf24;
            --bg-overlay: rgba(0, 0, 0, 0.4);
        }

        body { 
            margin: 0; padding: 0; 
            /* الحفاظ على خلفيتك الأصلية */
            background: url('background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh;
        }

        /* حاوية التصميم الجديدة (مثل الصورة) */
        .main-card {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
        }

        .card-header {
            margin-bottom: 25px;
        }

        .card-header h1 {
            color: var(--primary-green);
            font-size: 2.2rem;
            margin: 0;
            font-weight: 800;
        }

        .card-header p {
            color: #666;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        /* صندوق إدخال المعلومات */
        .input-group {
            margin: 25px 0;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: var(--primary-green);
            outline: none;
            box-shadow: 0 0 8px rgba(45, 106, 79, 0.2);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #1b4332;
        }

        .btn-facebook {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            color: #1877f2;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
        }

        /* شريط المعلومات السفلي */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--primary-green);
            color: white;
            padding: 10px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 0.85rem;
            border-top: 3px solid var(--accent-gold);
        }

        .ticker-container {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            margin: 0 20px;
        }

        .ticker-text {
            display: inline-block;
            animation: ticker 25s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* تنسيق جدول النتائج */
        .results-container {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 20px;
            width: 95%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f8f9fa; color: var(--primary-green); padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; color: #333; }
        
        .status-paid { color: #2d6a4f; font-weight: bold; }
        .status-pending { color: #d97706; font-weight: bold; }

    </style>
</head>
<body>

    <div class="main-card" id="login-card">
        <div class="card-header">
            <i class="fa-solid fa-wheat-awn" style="font-size: 3rem; color: var(--primary-green);"></i>
            <h1>بوابة الفلاح سطيف</h1>
            <p>البوابة الرقمية للفلاح</p>
        </div>

        <div class="input-group">
            <label>رقم التعريف الشريك (Code Partenaire)</label>
            <input type="text" id="pCode" class="input-field" placeholder="أدخل الكود هنا...">
        </div>

        <button class="btn-submit" onclick="showResults()" id="mainBtn">دخول النظام</button>

        <a href="https://www.facebook.com/people/CCLS-Setif/100065090058465/" target="_blank" class="btn-facebook">
            <i class="fa-brands fa-facebook" style="font-size: 1.5rem;"></i>
            زورونا على الفيسبوك
        </a>
    </div>

    <div class="results-container" id="results-area">
        <h2 style="color: var(--primary-green); text-align: center;">كشف مستحقات الشريك</h2>
        <div id="farmer-display" style="margin-bottom:15px; text-align:right; border-right: 4px solid var(--accent-gold); padding-right:10px;"></div>
        
        <table>
            <thead>
                <tr>
                    <th>رقم البون</th>
                    <th>التاريخ</th>
                    <th>المنتج</th>
                    <th>الكمية</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="data-table-body"></tbody>
        </table>
        
        <button class="btn-submit" onclick="location.reload()" style="margin-top:20px; background:#666;">خروج</button>
    </div>

    <div class="bottom-bar">
        <div id="current-time" style="font-weight: bold; min-width: 150px;"></div>
        <div class="ticker-container">
            <div class="ticker-text">
                🌾 مرحبا بكم في البوابة الرقمية للفلاح لولاية سطيف .. نحن دائما في خدمتكم .. المقر الاجتماعي: 56 شارع 1 نوفمبر 1954، سطيف .. الهاتف: 036.53.84.15
            </div>
        </div>
        <div id="weather-info" style="min-width: 100px;">
            <i class="fa-solid fa-temperature-half"></i> سطيف: 18°C
        </div>
    </div>

    <script>
        // تحديث الوقت
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-DZ', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('ar-DZ', { day: 'numeric', month: 'short' });
            document.getElementById('current-time').innerHTML = `<i class="fa-regular fa-clock"></i> ${timeStr} | ${dateStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function showResults() {
            const codeInput = document.getElementById('pCode').value.trim();
            const btn = document.getElementById('mainBtn');
            if (!codeInput) { alert("يرجى إدخال الكود"); return; }

            try {
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحقق...';
                const response = await fetch(`${window.location.origin}/api/search/${codeInput}`);
                const result = await response.json();

                if (result.success) {
                    document.getElementById('login-card').style.display = 'none';
                    document.getElementById('results-area').style.display = 'block';
                    
                    document.getElementById('farmer-display').innerHTML = `
                        <p><b>الاسم الكامل:</b> ${result.farmerName}</p>
                        <p><b>كود الشريك:</b> ${codeInput}</p>
                    `;
                    
                    let rows = "";
                    result.data.forEach(item => {
                        const isPaid = item.bankstatus && item.bankstatus.toString().trim() === "1";
                        rows += `
                            <tr>
                                <td>${item["No Bon"]}</td>
                                <td>${item["Date Bon"]}</td>
                                <td>${item["Produit"]}</td>
                                <td style="font-weight:bold;">${item["qte"]}</td>
                                <td class="${isPaid ? 'status-paid' : 'status-pending'}">
                                    ${isPaid ? 'تم الدفع' : 'قيد الانتظار'}
                                </td>
                            </tr>`;
                    });
                    document.getElementById('data-table-body').innerHTML = rows;
                } else {
                    alert("عذراً، هذا الكود غير مسجل.");
                    btn.innerHTML = 'دخول النظام';
                }
            } catch (err) {
                alert("حدث خطأ في الاتصال بالسيرفر.");
                btn.innerHTML = 'دخول النظام';
            }
        }
    </script>
</body>
</html>
