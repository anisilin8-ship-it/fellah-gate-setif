<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الفلاح سطيف | البوابة الرقمية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --gold: #fbbf24; 
            --green: #10b981; 
            --glass: rgba(0, 0, 0, 0.8); 
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body { 
            margin: 0; padding: 0; 
            background: url('background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: white; 
            min-height: 100vh;
            /* تفعيل النزول على الهاتف */
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* حاوية الوسط لتجنب التداخل مع الشريط السفلي */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px 0 80px 0; /* مسافة أمان للشريط السفلي */
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .logo-title { font-size: 2.2rem; color: var(--gold); margin: 0; }
        .sub-title { font-size: 1.1rem; color: #e5e7eb; display: block; margin-bottom: 20px; }

        .input-field {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .btn-main {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        /* تحسين عرض النتائج للهاتف */
        .results-view { 
            display: none; 
            width: 95%; 
            max-width: 800px; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(20px); 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid var(--glass-border);
            margin-bottom: 100px;
        }

        .farmer-card { 
            background: rgba(255,255,255,0.05); 
            padding: 15px; 
            border-radius: 12px; 
            border-right: 4px solid var(--gold); 
            text-align: right; 
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        /* جعل الجدول قابلاً للسحب يميناً ويساراً في الهاتف */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { color: var(--gold); padding: 12px; border-bottom: 2px solid var(--glass-border); font-size: 0.85rem; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-size: 0.85rem; }

        /* الشريط السفلي - تحسين الظهور على الهاتف */
        .bottom-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white; padding: 10px 0;
            display: flex; flex-direction: column; /* عمودي في الهاتف */
            align-items: center;
            border-top: 2px solid var(--gold);
            z-index: 9999;
        }

        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; margin: 5px 0; }
        .ticker-text { display: inline-block; animation: ticker 25s linear infinite; font-size: 0.8rem; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .info-row { display: flex; justify-content: space-between; width: 90%; font-size: 0.75rem; color: var(--gold); }

    </style>
</head>
<body>

    <div class="main-container">
        <div class="glass-card" id="login-screen">
            <h1 class="logo-title">بوابة الفلاح سطيف</h1>
            <span class="sub-title">البوابة الرقمية للفلاح</span>

            <div style="text-align: right; width: 100%;">
                <label style="color: var(--gold); font-size: 0.9rem;">رقم التعريف الشريك:</label>
                <input type="text" id="pCode" class="input-field" placeholder="أدخل الكود هنا">
            </div>

            <button class="btn-main" onclick="showResults()" id="mainBtn">دخول النظام</button>

            <a href="https://www.facebook.com/people/CCLS-Setif/100065090058465/" target="_blank" 
               style="color: #60a5fa; text-decoration: none; display: block; margin-top: 15px; font-size: 0.9rem;">
                <i class="fa-brands fa-facebook"></i> زورونا على الفيسبوك
            </a>
        </div>

        <div class="results-view" id="results-screen">
            <h2 style="color: var(--gold); text-align: center; font-size: 1.3rem;">كشف المستحقات</h2>
            <div id="farmer-display" class="farmer-card"></div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>رقم البون</th>
                            <th>التاريخ</th>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body"></tbody>
                </table>
            </div>
            
            <button class="btn-main" onclick="location.reload()" style="background: #4b5563; margin-top: 20px;">خروج</button>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="info-row">
            <div id="clock"></div>
            <div>سطيف: 18°C <i class="fa-solid fa-sun"></i></div>
        </div>
        <div class="ticker-wrap">
            <div class="ticker-text">
                🌾 مرحبا بكم في البوابة الرقمية للفلاح لولاية سطيف .. نحن دائما في خدمتكم .. المقر الاجتماعي: 56 شارع 1 نوفمبر 1954، سطيف.
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerHTML = now.toLocaleTimeString('ar-DZ', { hour: '2-digit', minute: '2-digit' }) + " | " + now.toLocaleDateString('ar-DZ', { day: 'numeric', month: 'short' });
        }
        setInterval(updateTime, 1000); updateTime();

        async function showResults() {
            const codeInput = document.getElementById('pCode').value.trim();
            const btn = document.getElementById('mainBtn');
            if (!codeInput) { alert("يرجى إدخال الكود"); return; }

            try {
                btn.innerHTML = 'جاري التحقق...';
                const response = await fetch(`${window.location.origin}/api/search/${codeInput}`);
                const result = await response.json();

                if (result.success) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('results-screen').style.display = 'block';
                    
                    document.getElementById('farmer-display').innerHTML = `
                        <b>الاسم:</b> ${result.farmerName}<br>
                        <b>الكود:</b> ${codeInput}
                    `;
                    
                    let rows = "";
                    result.data.forEach(item => {
                        const isPaid = item.bankstatus && item.bankstatus.toString().trim() === "1";
                        rows += `
                            <tr>
                                <td>${item["No Bon"]}</td>
                                <td>${item["Date Bon"]}</td>
                                <td>${item["Produit"]}</td>
                                <td style="color:var(--gold); font-weight:bold;">${item["qte"]}</td>
                                <td style="color:${isPaid ? '#10b981' : '#fbbf24'}; font-weight:bold;">
                                    ${isPaid ? 'تم الدفع' : 'قيد الانتظار'}
                                </td>
                            </tr>`;
                    });
                    document.getElementById('data-table-body').innerHTML = rows;

                    // التمرير التلقائي لأعلى الصفحة عند ظهور النتائج
                    window.scrollTo({ top: 0, behavior: 'smooth' });

                } else {
                    alert("الكود غير صحيح");
                    btn.innerHTML = 'دخول النظام';
                }
            } catch (err) { alert("خطأ في الاتصال"); }
        }
    </script>
</body>
</html>
