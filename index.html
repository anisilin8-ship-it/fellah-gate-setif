<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الفلاح الرقمية | CCLS Sétif</title>
    <meta name="google-site-verification" content="D9c3GjOwDbYbsGfw8IDrTBBSYKxjrXnElEClgSf9_rA" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --gold: #fbbf24; 
            --green: #10b981; 
            --dark-green: #064e3b; 
            --glass: rgba(0, 0, 0, 0.8); 
        }

        body { 
            margin: 0; 
            padding: 0; 
            background: var(--dark-green) url('background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 25px; 
            padding: 40px; 
            width: 90%; 
            max-width: 850px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            animation: fadeIn 0.8s ease-out; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .logo-title { font-size: 2.8rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .sub-title { font-size: 1.4rem; margin-top: 5px; opacity: 0.9; border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 5px; }
        
        .search-box { position: relative; margin: 35px auto; width: 80%; }
        .search-box i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--green); font-size: 1.4rem; }
        
        input { 
            width: 100%; 
            padding: 18px 60px 18px 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(251, 191, 36, 0.4); 
            background: rgba(255,255,255,0.1); 
            color: white; 
            font-size: 1.2rem; 
            text-align: center; 
            outline: none; 
            box-sizing: border-box; 
        }

        button { 
            background: linear-gradient(135deg, var(--green), #059669); 
            color: white; 
            border: none; 
            padding: 15px 45px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.2rem; 
            transition: 0.3s; 
        }
        button:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.4); }

        .farmer-info { 
            background: rgba(255,255,255,0.08); 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 25px; 
            text-align: right; 
            border-right: 5px solid var(--gold); 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }

        .results-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(0,0,0,0.3); }
        .results-table th { background: #064e3b; color: var(--gold); padding: 15px; font-size: 0.95rem; }
        .results-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        .status-badge { padding: 5px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; color: white; }

        .footer-ticker { position: fixed; bottom: 0; width: 100%; background: #064e3b; color: white; padding: 10px 0; overflow: hidden; white-space: nowrap; border-top: 2px solid var(--gold); }
        .ticker-text { display: inline-block; animation: ticker 35s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div id="search-area">
            <i class="fa-solid fa-wheat-awn" style="font-size: 3rem; color: var(--gold); margin-bottom: 10px;"></i>
            <h1 class="logo-title">CCLS SÉTIF</h1>
            <div class="sub-title">البوابة الرقمية للفلاح</div>
            
            <div class="search-box">
                <i class="fa-solid fa-id-card-clip"></i>
                <input type="text" id="pCode" placeholder="أدخل كود الشريك الخاص بك">
            </div>
            
            <button onclick="showResults()" id="mainBtn">بحث في النظام</button>
        </div>

        <div id="result-area" style="display: none;">
            <h2 style="color: var(--gold);"><i class="fa-solid fa-file-invoice"></i> تفاصيل المستحقات</h2>
            <div id="farmer-display" class="farmer-info"></div>
            
            <div style="overflow-x: auto;">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>رقم البون</th>
                            <th>التاريخ</th>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body"></tbody>
                </table>
            </div>
            
            <button onclick="location.reload()" style="background: #4b5563; margin-top: 20px;">رجوع</button>
        </div>
    </div>

    <div class="footer-ticker">
        <div class="ticker-text">
            🌾 مرحبا بكم في البوابة الرقمية لتعاونية الحبوب والبقول الجافة لولاية سطيف .. نحن دائماً في خدمتكم .. المقر الاجتماعي: 56 شارع 1 نوفمبر 1954، سطيف.
        </div>
    </div>

    <script>
        async function showResults() {
            const codeInput = document.getElementById('pCode').value.trim();
            const btn = document.getElementById('mainBtn');

            if (!codeInput) {
                alert("يرجى إدخال كود الشريك");
                return;
            }

            try {
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري البحث...';
                btn.disabled = true;

                // طلب البيانات من السيرفر
                const response = await fetch(`${window.location.origin}/api/search/${codeInput}`);
                const result = await response.json();

                if (result.success) {
                    document.getElementById('search-area').style.display = 'none';
                    document.getElementById('result-area').style.display = 'block';
                    
                    document.getElementById('farmer-display').innerHTML = `
                        <div><b style="color: var(--gold);">الاسم:</b> ${result.farmerName}</div>
                        <div><b style="color: var(--gold);">الكود:</b> ${codeInput}</div>
                    `;
                    
                    let rows = "";
                    result.data.forEach(item => {
                        // الربط مع أسماء أعمدة ملف CSV الخاص بك بدقة
                        const isPaid = item.bankstatus && item.bankstatus.toString().trim() === "1";
                        const statusColor = isPaid ? "var(--green)" : "#d97706";
                        const statusText = isPaid ? "تم الدفع" : "قيد الانتظار";

                        rows += `
                            <tr>
                                <td>${item["No Bon"] || "---"}</td>
                                <td>${item["Date Bon"] || "---"}</td>
                                <td>${item["Produit"] || "---"}</td>
                                <td style="color: var(--gold); font-weight:bold;">${item["qte"] || "0"}</td>
                                <td>
                                    <span class="status-badge" style="background:${statusColor};">
                                        ${statusText}
                                    </span>
                                </td>
                            </tr>`;
                    });
                    document.getElementById('data-table-body').innerHTML = rows;
                } else {
                    alert("كود الشريك غير موجود.");
                    btn.innerHTML = 'بحث في النظام';
                    btn.disabled = false;
                }
            } catch (err) {
                alert("خطأ في الاتصال بالسيرفر.");
                btn.innerHTML = 'بحث في النظام';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
