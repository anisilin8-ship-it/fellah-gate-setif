<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الفلاح سطيف | البوابة الرقمية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --gold: #fbbf24; 
            --emerald: #10b981; 
            --glass-deep: rgba(0, 0, 0, 0.85);
            --border: rgba(255, 255, 255, 0.15);
            --glow: 0 0 25px rgba(251, 191, 36, 0.4);
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow-x: hidden; overflow-y: auto;
            background: #064e3b url('background.jpg') no-repeat center center fixed; 
            background-size: cover; font-family: 'Segoe UI', Tahoma, sans-serif; color: white;
        }

        .page-container {
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: 20px 15px 160px 15px; box-sizing: border-box;
        }

        .glass-panel {
            background: var(--glass-deep); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 40px; padding: 40px 25px;
            width: 100%; max-width: 500px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        .main-title { 
            font-size: clamp(1.8rem, 8vw, 2.8rem); font-weight: 900; color: var(--gold); 
            margin: 0; text-shadow: var(--glow); border-left: 4px solid var(--gold);
            white-space: nowrap; overflow: hidden; width: 0;
            animation: typing 4s steps(20) infinite alternate, cursorBlink 0.5s step-end infinite;
        }

        @keyframes typing { 0% { width: 0; } 50% { width: 100%; } 100% { width: 0; } }
        @keyframes cursorBlink { 50% { border-color: transparent } }

        .brand-icon { font-size: 5rem; color: var(--gold); margin-bottom: 10px; filter: drop-shadow(var(--glow)); }
        .sub-title { font-size: 1.5rem; color: #fff; margin-bottom: 5px; display: block; font-weight: 800; }

        .season-badge {
            display: inline-block; padding: 6px 20px; background: rgba(251, 191, 36, 0.12);
            border: 1px solid var(--gold); border-radius: 25px; color: var(--gold);
            font-size: 1rem; font-weight: bold; margin-bottom: 30px; box-shadow: var(--glow);
        }

        .modern-input {
            width: 100%; padding: 20px; background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--border); border-radius: 20px; color: white;
            font-size: 1.4rem; text-align: center; transition: 0.4s; box-sizing: border-box;
        }

        .btn-action {
            width: 100%; background: linear-gradient(135deg, var(--emerald), #059669);
            color: white; border: none; padding: 18px; border-radius: 20px;
            font-size: 1.4rem; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        .results-view { display: none; width: 100%; max-width: 900px; background: var(--glass-deep); backdrop-filter: blur(35px); border-radius: 35px; padding: 25px; border: 1px solid var(--border); }
        
        .farmer-info-header { 
            background: rgba(255,255,255,0.06); padding: 20px; border-radius: 20px; 
            border-bottom: 2px solid var(--gold); text-align: right; margin-bottom: 25px; 
            display: flex; justify-content: space-between; align-items: center;
        }

        .table-res { width: 100%; overflow-x: auto; border-radius: 18px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: rgba(251, 191, 36, 0.15); color: var(--gold); padding: 15px; font-weight: 900; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }

        .footer-premium {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.98); border-top: 3px solid var(--gold); z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <div class="glass-panel" id="entry-card">
            <div class="brand-icon"><i class="fa-solid fa-wheat-awn"></i></div>
            <h1 class="main-title">بوابة الفلاح سطيف</h1>
            <span class="sub-title">البوابة الرقمية للفلاح</span>
            <div class="season-badge">موسم الحصاد والدرس 2025/2026</div>
            <input type="text" id="pCode" class="modern-input" placeholder="أدخل رقم الشريك">
            <button class="btn-action" onclick="fetchData()" id="searchBtn">بـحـث</button>
        </div>

        <div class="results-view" id="results-card">
            <h2 style="color: var(--gold); text-align: center;"><i class="fa-solid fa-receipt"></i> كشف المستحقات المالية</h2>
            <div id="farmer-profile-header" class="farmer-info-header"></div>
            <div class="table-res">
                <table>
                    <thead>
                        <tr><th>N BON</th><th>التاريخ</th><th>المنتج</th><th>الكمية</th><th>حالة الدفع</th></tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <button class="btn-action" onclick="location.reload()" style="background: #374151; margin-top: 20px;">خروج</button>
        </div>
    </div>

    <div class="footer-premium">
        <div style="text-align: center; padding: 10px; color: var(--gold);" id="clock"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleDateString('ar-DZ', {day:'numeric', month:'long', year:'numeric'}) + " | " + now.toLocaleTimeString('ar-DZ');
        }
        setInterval(updateClock, 1000); updateClock();

        async function fetchData() {
            const code = document.getElementById('pCode').value.trim();
            const btn = document.getElementById('searchBtn');
            if(!code) return;
            try {
                btn.innerHTML = 'جاري التحميل...';
                const res = await fetch(`${window.location.origin}/api/search/${code}`);
                const result = await res.json();
                if(result.success) {
                    document.getElementById('entry-card').style.display = 'none';
                    document.getElementById('results-card').style.display = 'block';
                    document.getElementById('farmer-profile-header').innerHTML = `
                        <div><span>اسم الفلاح:</span> <br> <b>${result.farmerName}</b></div>
                        <div style="text-align: left;"><span>كود الشريك:</span> <br> <b style="color:var(--gold)">${code}</b></div>
                    `;
                    let html = "";
                    result.data.forEach(item => {
                        // الحل النهائي: التحقق من القيمة 1 مهما كان نوعها (نص أو رقم)
                        const isPaid = (String(item.bankstatus).trim() === "1");
                        html += `<tr>
                            <td>${item["No Bon"]}</td>
                            <td>${item["Date Bon"]}</td>
                            <td>${item["Produit"]}</td>
                            <td style="color:var(--gold)">${item["qte"]}</td>
                            <td style="color:${isPaid ? '#10b981' : '#fbbf24'}"><b>${isPaid ? 'تم الدفع ✓' : 'قيد المعالجة ⏳'}</b></td>
                        </tr>`;
                    });
                    document.getElementById('table-body').innerHTML = html;
                } else { alert("الكود غير موجود"); btn.innerHTML = "بـحـث"; }
            } catch(e) { alert("خطأ في الاتصال"); btn.innerHTML = "بـحـث"; }
        }
    </script>
</body>
</html>
