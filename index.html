<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الفلاح | CCLS Sétif</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #fbbf24; --green: #10b981; --dark-bg: rgba(0, 0, 0, 0.75); }
        body {
            margin: 0; padding: 0;
            background: #064e3b url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif;
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .glass-panel {
            background: var(--dark-bg); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px;
            padding: 40px; width: 90%; max-width: 600px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .logo-icon { font-size: 3rem; color: var(--gold); margin-bottom: 10px; }
        input {
            width: 80%; padding: 15px; border-radius: 10px; border: none;
            margin: 20px 0; font-size: 1.1rem; text-align: center;
        }
        button {
            background: var(--green); color: white; border: none;
            padding: 15px 40px; border-radius: 10px; cursor: pointer;
            font-weight: bold; font-size: 1.1rem; width: 85%;
        }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th { color: var(--gold); padding: 10px; border-bottom: 1px solid var(--gold); }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div id="search-area">
            <i class="fa-solid fa-wheat-awn logo-icon"></i>
            <h2>بوابة الفلاح الرقمية - سطيف</h2>
            <input type="text" id="pCode" placeholder="أدخل رقم الشريك (مثلاً: 1908...)">
            <button onclick="doSearch()">دخول للنظام</button>
        </div>
        <div id="result-area" style="display:none;">
            <h3 id="farmer-name" style="color: var(--gold);"></h3>
            <table>
                <thead><tr><th>رقم البون</th><th>المنتج</th><th>الكمية</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
            <button onclick="location.reload()" style="background:#4b5563; margin-top:20px;">رجوع</button>
        </div>
    </div>
    <script>
        async function doSearch() {
            const code = document.getElementById('pCode').value;
            if(!code) return alert("يرجى إدخال الكود");
            try {
                const res = await fetch(`/api/search/${code}`);
                const result = await res.json();
                if(result.success) {
                    document.getElementById('search-area').style.display = 'none';
                    document.getElementById('result-area').style.display = 'block';
                    document.getElementById('farmer-name').innerText = result.farmerName;
                    let rows = "";
                    result.data.forEach(item => {
                        rows += `<tr><td>${item.NoBon}</td><td>${item.Produit}</td><td>${item.Qte}</td></tr>`;
                    });
                    document.getElementById('table-body').innerHTML = rows;
                } else { alert("الكود غير صحيح"); }
            } catch(e) { alert("خطأ في الاتصال بالسيرفر"); }
        }
    </script>
</body>
</html>
